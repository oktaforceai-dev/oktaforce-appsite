name: Deploy estático via FTP (Hostinger)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install deps
        run: npm ci

      - name: Build (Next export -> /out)
        run: NEXT_OUTPUT_EXPORT=true npm run build

      - name: Debug local /out
        run: |
          echo "=== OUT CONTENT ==="
          ls -la out
          find out -maxdepth 2 -type d -print

      - name: Remote PWD & list (before)
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -e "set ssl:verify-certificate no; open -p 21 -u $FTP_USER,$FTP_PASS $FTP_HOST; \
                   echo 'PWD:'; pwd; echo 'LIST:'; ls -la; bye"
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          port: 21
          local-dir: out/
          server-dir: /          # sua raiz do FTP JÁ é o public_html
          dangerous-clean-slate: true
          log-level: verbose
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/*.map
