name: Deploy estático via FTP (Hostinger)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@9 --activate

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Build (Next export -> /out)
        env:
          NEXT_OUTPUT_EXPORT: true
        run: pnpm build

      - name: Debug /out
        run: |
          echo "=== LISTANDO /out ==="
          ls -la out || true
          find out -maxdepth 3 -type f | head -200

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          port: 21
          local-dir: out/
          server-dir: /
          dangerous-clean-slate: true
          log-level: verbose
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/*.map
