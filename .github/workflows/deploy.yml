name: Deploy estático via FTP (Hostinger)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: |
          npm install -g pnpm@9
          pnpm --version

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # aqui o seu postbuild pode falhar, mas NÃO vamos parar o job
      - name: Build Next (pode falhar por causa do postbuild)
        env:
          NEXT_OUTPUT_EXPORT: "true"
        run: pnpm build
        continue-on-error: true

      # agora sim geramos o /out de verdade
      - name: Exportar para /out
        run: pnpm exec next export -o out

      - name: Verificar /out
        run: |
          if [ ! -d "out" ]; then
            echo "ERRO: diretório 'out' não foi gerado."
            exit 1
          fi

      - name: Debug /out
        run: ls -R out || true

      - name: Deploy via FTP (Hostinger)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: out
          server-dir: /domains/oktaforce.com.br/public_html
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/*.map
