name: Deploy estático via FTP (Hostinger)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      # 1) build SEM pedir export
      - name: Build Next (sem export)
        run: pnpm build
        env:
          NEXT_OUTPUT_EXPORT: "false"

      # 2) agora sim exporta pra /out
      - name: Exportar para /out
        run: pnpm run export

      - name: Verificar /out
        run: ls -R out || true

      - name: Deploy via FTP (Hostinger)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: out
          server-dir: /domains/oktaforce.com.br/public_html
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/*.map
